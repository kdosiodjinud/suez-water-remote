        function connexion_click() {
            PopupMessage(message);
            setTimeout("updateConnexion();", 2000);
        }
        function updateConnexion() {
            // TAG : BUG plantage IE
            var request = new XMLHttpRequest();
            request.onreadystatechange = function () {
                if ((request.readyState == 4) && (request.status == 200)) {
                    HidePopupMessage();
                    PopupMessage(message + "<br/><br/>" + request.responseText);
                    setTimeout("updateConnexion();", 2000);
                }
            }
            var user = document.getElementById("ctl00_PHZonePrincipale_TextBoxIdentifiant").value;
            request.open("GET", "AjaxLogin.ashx?action=progress&user=" + user + "&timestamp=" + (new Date().getTime()), true);
            request.send(null);
        }
